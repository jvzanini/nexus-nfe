name: Run Seed on Production

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    env:
      PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
      PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}
    steps:
      - name: Find app container and run seed
        timeout-minutes: 3
        run: |
          # Listar todos os containers
          echo "Listando containers..."
          CONTAINERS=$(curl --insecure -s --max-time 30 \
            -H "X-API-Key: ${PORTAINER_TOKEN}" \
            "${PORTAINER_URL}/api/endpoints/1/docker/containers/json?all=true")

          echo "Buscando container nexus-nfe..."
          echo "$CONTAINERS" | python3 -c "
          import sys,json
          data = json.load(sys.stdin)
          print(f'Total containers: {len(data)}')
          for c in data:
              names = c.get('Names', [])
              image = c.get('Image', '')
              state = c.get('State', '')
              print(f'  {names} | {image} | {state}')
          "

          # Buscar por imagem nexus-nfe (mais confiável que nome)
          CONTAINER_ID=$(echo "$CONTAINERS" | python3 -c "
          import sys,json
          for c in json.load(sys.stdin):
              img = c.get('Image', '')
              state = c.get('State', '')
              cmd = ' '.join(c.get('Command', '').split() if isinstance(c.get('Command'), str) else [])
              if 'nexus-nfe' in img and state == 'running' and 'worker' not in cmd:
                  print(c['Id'][:12]); break
          " 2>/dev/null)

          echo "Container ID encontrado: '${CONTAINER_ID}'"

          if [ -z "$CONTAINER_ID" ]; then
            echo "ERRO: Container nexus-nfe_app não encontrado rodando!"
            exit 1
          fi

          # Rodar migrate
          echo "=== Rodando prisma migrate deploy ==="
          EXEC1=$(curl --insecure -s --max-time 10 -X POST \
            -H "X-API-Key: ${PORTAINER_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"AttachStdout":true,"AttachStderr":true,"Cmd":["npx","prisma","migrate","deploy"]}' \
            "${PORTAINER_URL}/api/endpoints/1/docker/containers/${CONTAINER_ID}/exec")
          EXEC_ID1=$(echo "$EXEC1" | python3 -c "import sys,json; print(json.load(sys.stdin).get('Id',''))" 2>/dev/null)

          if [ -n "$EXEC_ID1" ]; then
            curl --insecure -s --max-time 60 -X POST \
              -H "Content-Type: application/json" \
              -d '{"Detach":true}' \
              "${PORTAINER_URL}/api/endpoints/1/docker/exec/${EXEC_ID1}/start" || true
            echo "Migrate disparado (detached)"
            sleep 10
          else
            echo "WARN: Não conseguiu criar exec para migrate"
          fi

          # Rodar seed
          echo "=== Rodando seed ==="
          EXEC2=$(curl --insecure -s --max-time 10 -X POST \
            -H "X-API-Key: ${PORTAINER_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"AttachStdout":true,"AttachStderr":true,"Cmd":["node","seed-prod.js"]}' \
            "${PORTAINER_URL}/api/endpoints/1/docker/containers/${CONTAINER_ID}/exec")
          EXEC_ID2=$(echo "$EXEC2" | python3 -c "import sys,json; print(json.load(sys.stdin).get('Id',''))" 2>/dev/null)

          if [ -n "$EXEC_ID2" ]; then
            curl --insecure -s --max-time 30 -X POST \
              -H "Content-Type: application/json" \
              -d '{"Detach":true}' \
              "${PORTAINER_URL}/api/endpoints/1/docker/exec/${EXEC_ID2}/start" || true
            echo "Seed disparado (detached)"
            sleep 5
          else
            echo "WARN: Não conseguiu criar exec para seed"
          fi

          echo "=== Concluído ==="
