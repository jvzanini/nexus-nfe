name: Run Seed on Production

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    env:
      PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
      PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}
    steps:
      - name: Find app container and run seed
        run: |
          # Listar containers
          CONTAINERS=$(curl --insecure -s \
            -H "X-API-Key: ${PORTAINER_TOKEN}" \
            "${PORTAINER_URL}/api/endpoints/1/docker/containers/json")

          # Encontrar o container nexus-nfe_app
          CONTAINER_ID=$(echo "$CONTAINERS" | python3 -c "
          import sys,json
          for c in json.load(sys.stdin):
              for name in c.get('Names', []):
                  if 'nexus-nfe_app' in name:
                      print(c['Id'][:12]); break
          " 2>/dev/null)

          echo "Container ID: $CONTAINER_ID"

          if [ -z "$CONTAINER_ID" ]; then
            echo "Container nexus-nfe_app não encontrado!"

            echo "Containers disponíveis:"
            echo "$CONTAINERS" | python3 -c "
          import sys,json
          for c in json.load(sys.stdin):
              print(c.get('Names', []), c.get('State', ''))
          "
            exit 1
          fi

          # Criar exec para rodar migrate deploy
          echo "Rodando prisma migrate deploy..."
          EXEC_CREATE=$(curl --insecure -s -X POST \
            -H "X-API-Key: ${PORTAINER_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"AttachStdout":true,"AttachStderr":true,"Cmd":["npx","prisma","migrate","deploy"]}' \
            "${PORTAINER_URL}/api/endpoints/1/docker/containers/${CONTAINER_ID}/exec")

          EXEC_ID=$(echo "$EXEC_CREATE" | python3 -c "import sys,json; print(json.load(sys.stdin)['Id'])" 2>/dev/null)

          if [ -n "$EXEC_ID" ]; then
            curl --insecure -s -X POST \
              -H "X-API-Key: ${PORTAINER_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"Detach":false,"Tty":false}' \
              "${PORTAINER_URL}/api/endpoints/1/docker/exec/${EXEC_ID}/start" || true
            echo "Migrate executado"
          fi

          # Criar exec para rodar seed
          echo "Rodando seed..."
          EXEC_CREATE2=$(curl --insecure -s -X POST \
            -H "X-API-Key: ${PORTAINER_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"AttachStdout":true,"AttachStderr":true,"Cmd":["node","seed-prod.js"]}' \
            "${PORTAINER_URL}/api/endpoints/1/docker/containers/${CONTAINER_ID}/exec")

          EXEC_ID2=$(echo "$EXEC_CREATE2" | python3 -c "import sys,json; print(json.load(sys.stdin)['Id'])" 2>/dev/null)

          if [ -n "$EXEC_ID2" ]; then
            SEED_OUTPUT=$(curl --insecure -s -X POST \
              -H "X-API-Key: ${PORTAINER_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"Detach":false,"Tty":false}' \
              "${PORTAINER_URL}/api/endpoints/1/docker/exec/${EXEC_ID2}/start" 2>&1 || true)
            echo "Seed output: $SEED_OUTPUT"
          fi

          echo "Done!"
