name: Update Stack Env Vars

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
      PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Get stack ID and update
        run: |
          # Find the stack
          STACKS=$(curl --insecure -s \
            -H "X-API-Key: ${PORTAINER_TOKEN}" \
            "${PORTAINER_URL}/api/stacks")

          STACK_ID=$(echo "$STACKS" | python3 -c "
          import sys,json
          for s in json.load(sys.stdin):
              if s['Name'] == 'nexus-nfe':
                  print(s['Id']); break
          " 2>/dev/null)

          echo "Stack ID: $STACK_ID"

          if [ -z "$STACK_ID" ]; then
            echo "Stack not found!"
            exit 1
          fi

          ENV_VARS=$(python3 -c "
          import json, os
          print(json.dumps([
              {'name':'DB_PASSWORD','value':os.environ['DB_PASSWORD']},
              {'name':'NEXTAUTH_SECRET','value':os.environ['NEXTAUTH_SECRET']},
              {'name':'ENCRYPTION_KEY','value':os.environ['ENCRYPTION_KEY']},
              {'name':'RESEND_API_KEY','value':os.environ['RESEND_API_KEY']},
              {'name':'ADMIN_EMAIL','value':os.environ['ADMIN_EMAIL']},
              {'name':'ADMIN_PASSWORD','value':os.environ['ADMIN_PASSWORD']},
          ]))
          ")

          COMPOSE=$(cat docker-compose.yml)

          # Update stack
          RESULT=$(curl --insecure -s -X PUT \
            -H "X-API-Key: ${PORTAINER_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"StackFileContent\": $(echo "$COMPOSE" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))'),
              \"Env\": ${ENV_VARS},
              \"Prune\": false,
              \"PullImage\": true
            }" \
            "${PORTAINER_URL}/api/stacks/${STACK_ID}?endpointId=1")

          echo "Update result:"
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Name:', d.get('Name'), '| ID:', d.get('Id'))" 2>/dev/null || echo "$RESULT" | head -c 300

          echo "Stack updated with correct credentials!"
