name: Update Stack Env Vars

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
      PORTAINER_TOKEN: ${{ secrets.PORTAINER_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Get stack ID and update
        run: |
          # Find the stack
          STACKS=$(curl --insecure -s \
            -H "X-API-Key: ${PORTAINER_TOKEN}" \
            "${PORTAINER_URL}/api/stacks")

          STACK_ID=$(echo "$STACKS" | python3 -c "
          import sys,json
          for s in json.load(sys.stdin):
              if s['Name'] == 'nexus-nfe':
                  print(s['Id']); break
          " 2>/dev/null)

          echo "Stack ID: $STACK_ID"

          if [ -z "$STACK_ID" ]; then
            echo "Stack not found!"
            exit 1
          fi

          ENV_VARS='[
            {"name":"DB_PASSWORD","value":"***REMOVED-DB-PASSWORD***"},
            {"name":"NEXTAUTH_SECRET","value":"***REMOVED-NEXTAUTH-SECRET***"},
            {"name":"ENCRYPTION_KEY","value":"***REMOVED-ENCRYPTION-KEY***"},
            {"name":"RESEND_API_KEY","value":"***REMOVED-RESEND-KEY***"},
            {"name":"ADMIN_EMAIL","value":"nexusai360@gmail.com"},
            {"name":"ADMIN_PASSWORD","value":"***REMOVED-ADMIN-PASSWORD***"}
          ]'

          COMPOSE=$(cat docker-compose.yml)

          # Update stack
          RESULT=$(curl --insecure -s -X PUT \
            -H "X-API-Key: ${PORTAINER_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"StackFileContent\": $(echo "$COMPOSE" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))'),
              \"Env\": ${ENV_VARS},
              \"Prune\": false,
              \"PullImage\": true
            }" \
            "${PORTAINER_URL}/api/stacks/${STACK_ID}?endpointId=1")

          echo "Update result:"
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Name:', d.get('Name'), '| ID:', d.get('Id'))" 2>/dev/null || echo "$RESULT" | head -c 300

          echo "Stack updated with correct credentials!"
